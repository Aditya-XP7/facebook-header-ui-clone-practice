<!DOCTYPE html>
<html>
  <head>
    <title>Facebook header</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="header">
      <div class="left-section">
        <div class="image-box"><img class="image" src="cat2.jpg"></div>
        <div class="name">Oliver Cat</div>
      </div>
      <div class="right-section">

      </div>
    </div>
  </body>
</html>
